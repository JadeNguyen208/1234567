<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thông Báo Toàn Chùa</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --green-dark:#1a5c3a;--green-mid:#2d7a52;--green-light:#e8f5ee;--green-pale:#f2faf5;
  --red:#c0392b;--red-light:#fdecea;
  --orange:#e8720a;--orange-light:#fff0e4;
  --yellow:#c9950a;--yellow-light:#fffbdf;
  --teal:#00796b;--teal-light:#e0f2f1;
  --gray-bg:#f5f0e8;--gray-border:#e2d9cc;--gray-text:#6b7280;--dark:#2c1a0e;
  --font:'Be Vietnam Pro',sans-serif;
  --shadow-sm:0 1px 4px rgba(0,0,0,.07);--shadow-md:0 4px 16px rgba(0,0,0,.1);--shadow-lg:0 8px 32px rgba(0,0,0,.15);
  --card-bg:#fff;
}
html,body,input,select,textarea,button{font-family:var(--font);}
html,body{background:var(--gray-bg);color:var(--dark);min-height:100vh;overflow-x:hidden;font-size:16px;}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:#d1c8b0;border-radius:3px;}
.page-wrap{max-width:780px;margin:0 auto;padding:28px 20px 60px;}
.page-title-block{margin-bottom:24px;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.page-title-text{display:flex;flex-direction:column;align-items:flex-start;}
.page-title{font-size:26px;font-weight:900;color:#0d2e1e;letter-spacing:-.3px;}
.page-lunar{font-size:13px;color:#00796b;margin-top:5px;font-weight:700;letter-spacing:.3px;}
.top-bar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:20px;background:#fff;border:1.5px solid var(--gray-border);border-radius:24px;padding:5px 8px 5px 14px;}
.filter-label{font-size:12px;font-weight:700;color:#9a7a50;white-space:nowrap;margin-right:2px;flex-shrink:0;}
.filter-btn{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:20px;border:1.5px solid transparent;background:transparent;font-size:12px;font-weight:700;color:var(--gray-text);cursor:pointer;transition:all .12s;white-space:nowrap;}
.filter-btn:hover{background:var(--gray-bg);}
.filter-btn.active{border-color:transparent;}
.filter-btn.fb-all.active{background:#f5f0e8;color:#5a3d1a;border-color:#d4c4a0;}
.filter-btn.fb-red.active{background:var(--red-light);color:var(--red);border-color:var(--red);}
.filter-btn.fb-orange.active{background:var(--orange-light);color:var(--orange);border-color:var(--orange);}
.filter-btn.fb-green.active{background:var(--green-light);color:var(--green-dark);border-color:var(--green-dark);}
.filter-btn.fb-teal.active{background:var(--teal-light);color:var(--teal);border-color:var(--teal);}
.fdot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.bar-sep{width:1px;height:18px;background:var(--gray-border);flex-shrink:0;margin:0 2px;}
.search-inline{display:flex;align-items:center;gap:5px;padding:4px 8px;min-width:140px;flex:1;}
.search-inline input{border:none;outline:none;font-size:13px;font-family:var(--font);color:var(--dark);background:transparent;width:100%;}
.search-inline input::placeholder{color:#bbb;}
.section-block{margin-bottom:32px;}
.section-head{display:flex;align-items:center;gap:7px;margin-bottom:12px;}
.section-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.section-name{font-size:12px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;}
.section-count{font-size:11px;font-weight:700;color:#aaa;margin-left:2px;}
.section-line{flex:1;height:1px;background:var(--gray-border);}

/* ── CARD: horizontal layout ── */
.notif-card{
  background:var(--card-bg);
  border-radius:11px;
  border:1.5px solid var(--gray-border);
  overflow:hidden;
  transition:box-shadow .15s,transform .15s;
  margin-bottom:10px;
  display:flex;
  flex-direction:row;
  align-items:flex-start; /* ← key: card height = tallest child, not stretched */
}
.notif-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px);}
.notif-card.c-red{border-left:4px solid var(--red);}
.notif-card.c-orange{border-left:4px solid var(--orange);}
.notif-card.c-green{border-left:4px solid var(--green-dark);}
.notif-card.c-teal{border-left:4px solid var(--teal);}

/* ── IMAGE: strict 16:9, card height follows ── */
.notif-img{
  flex-shrink:0;
  width:220px;
  aspect-ratio:16/9;   /* ← enforces exact 16:9 = 123.75px tall */
  position:relative;
  overflow:hidden;
  background:#e8e0d0;
  align-self:stretch;  /* ← fill card height if text is taller than image */
}
.notif-img img{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
  object-position:center;
  display:block;
}
/* ::before removed — aspect-ratio handles it natively */
.notif-card.no-img .notif-img{display:none;}

.notif-body{flex:1;padding:14px 16px 13px;min-width:0;display:flex;flex-direction:column;gap:6px;}
.notif-title-row{display:flex;align-items:flex-start;gap:8px;}
.notif-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
.notif-title{font-size:14px;font-weight:800;color:var(--dark);line-height:1.45;}
.notif-card.c-red .notif-title{color:var(--red);}
.notif-excerpt-inline{padding-left:16px;font-size:13.5px;color:#5a4030;line-height:1.65;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.notif-excerpt-wrapper{padding-left:16px;font-size:13.5px;color:#5a4030;line-height:1.65;}
.notif-read-more{display:inline;font-size:13px;font-weight:700;color:var(--green-dark);white-space:nowrap;cursor:pointer;margin-left:4px;}
.notif-read-more:hover{text-decoration:underline;}
.notif-meta{padding-left:16px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:auto;padding-top:6px;}
.notif-meta span{font-size:11.5px;color:#9a8060;}
.notif-meta-sep{color:#d0c0a0;}
.notif-like{margin-left:auto;font-size:12px;font-weight:700;color:#9a8060;display:flex;align-items:center;gap:3px;position:relative;cursor:pointer;padding:2px 4px;border-radius:6px;transition:background .12s;}
.notif-like:hover{background:#f5f0e8;}
.like-popover{position:absolute;bottom:calc(100% + 6px);right:0;background:#fff;border:1.5px solid var(--gray-border);border-radius:10px;box-shadow:var(--shadow-lg);padding:10px 12px;min-width:190px;z-index:400;display:none;animation:modal-in .15s ease both;}
.like-popover.open{display:block;}
.like-popover-title{font-size:10px;font-weight:800;color:#9a8060;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px;}
.like-popover-list{display:flex;flex-direction:column;gap:4px;}
.like-popover-item{font-size:12px;font-weight:600;color:#4a3520;display:flex;align-items:center;gap:5px;}
.like-popover-item::before{content:'👍';font-size:11px;}
.like-popover-empty{font-size:12px;color:#bbb;font-style:italic;}
.edited-badge{font-size:11px;font-weight:700;color:#7a5a00;background:#fff3cd;border:1px solid #e8c84a;border-radius:5px;padding:1px 6px;white-space:nowrap;}
.create-btn{display:flex;align-items:center;gap:7px;padding:9px 20px;background:#fff3cd;color:#7a5a00;border:1.5px solid #e8c84a;border-radius:24px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;flex-shrink:0;margin-top:4px;}
.create-btn:hover{background:#ffeea0;border-color:#c9950a;}
.create-btn-icon{width:18px;height:18px;background:#e8c84a;color:#7a5a00;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:900;line-height:1;flex-shrink:0;}

/* ── Responsive: stack on narrow screens ── */
@media(max-width:500px){
  .notif-card{flex-direction:column;}
  .notif-img{width:100%;aspect-ratio:16/9;}
}

.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.48);z-index:600;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(5px);}
.detail-overlay.open{display:flex;}
.detail-wrap{position:relative;width:100%;max-width:640px;}
.detail-modal{background:#fff;border-radius:16px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modal-in .2s ease both;}
.detail-hero{width:100%;aspect-ratio:16/9;height:auto;object-fit:cover;border-radius:16px 16px 0 0;display:block;}
.detail-content{padding:24px 28px 32px;}
.detail-badge-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.detail-badge{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:700;}
.detail-ban{font-size:12px;color:#9a8060;font-weight:600;}
.detail-title{font-size:20px;font-weight:900;color:var(--dark);line-height:1.4;margin-bottom:10px;}
.detail-meta-row{display:flex;align-items:center;gap:8px;margin-bottom:20px;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--gray-border);}
.detail-meta-row span{font-size:12px;color:#9a8060;}
.detail-body{font-size:17px;color:#4a3520;line-height:1.9;}
.detail-body p{margin-bottom:14px;}
.detail-body strong{font-weight:800;color:#2c1a0e;}
.detail-body ul,.detail-body ol{padding-left:22px;margin-bottom:14px;}
.detail-body li{margin-bottom:6px;}
.detail-close{position:absolute;top:14px;right:14px;width:36px;height:36px;border:none;background:rgba(255,255,255,.95);border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 10px rgba(0,0,0,.22);z-index:10;color:#555;transition:all .15s;}
.detail-close:hover{background:#fff;color:#c0392b;transform:scale(1.05);}
.detail-color-bar{height:4px;border-radius:16px 16px 0 0;}
.detail-like-section{margin-top:20px;padding-top:16px;border-top:1px solid var(--gray-border);}
.detail-like-title{font-size:12px;font-weight:800;color:#9a8060;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;}
.detail-like-tags{display:flex;flex-wrap:wrap;gap:6px;}
.detail-like-tag{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;background:#f5f0e8;border:1px solid #e2d9cc;border-radius:20px;font-size:12px;font-weight:600;color:#5a3d1a;}
.empty-state{padding:32px 20px;text-align:center;color:#aaa;}
.empty-state .es-icon{font-size:36px;margin-bottom:8px;}
.empty-state .es-text{font-size:14px;font-weight:600;}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:none;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(3px);}
.overlay.open{display:flex;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);animation:modal-in .2s ease both;}
@keyframes modal-in{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.modal-header{padding:14px 18px 12px;border-bottom:1px solid var(--gray-border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;}
.modal-title{font-size:15px;font-weight:800;color:var(--dark);}
.modal-close{width:30px;height:30px;border:none;background:var(--gray-bg);border-radius:7px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--gray-text);}
.modal-close:hover{background:#e2d9cc;color:var(--dark);}
.modal-body{padding:16px 18px;display:flex;flex-direction:column;gap:13px;}
.form-group{display:flex;flex-direction:column;gap:5px;}
.form-label{font-size:11px;font-weight:800;color:#374151;text-transform:uppercase;letter-spacing:.5px;}
.form-label .req{color:var(--red);margin-left:2px;}
.form-input,.form-select,.form-textarea{padding:9px 11px;border:1.5px solid var(--gray-border);border-radius:7px;font-size:14px;color:var(--dark);background:var(--gray-bg);outline:none;transition:border-color .15s,background .15s;font-family:var(--font);}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--green-dark);background:#fff;}
.form-textarea{resize:vertical;min-height:68px;line-height:1.5;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.priority-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.priority-opt{padding:9px;border-radius:8px;border:1.5px solid var(--gray-border);cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:var(--gray-text);}
.priority-opt.selected.p-red{background:var(--red-light);border-color:var(--red);color:var(--red);}
.priority-opt.selected.p-orange{background:var(--orange-light);border-color:var(--orange);color:var(--orange);}
.priority-opt.selected.p-green{background:var(--green-light);border-color:var(--green-dark);color:var(--green-dark);}
.priority-opt.selected.p-teal{background:var(--teal-light);border-color:var(--teal);color:var(--teal);}
.pdot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.modal-footer{padding:10px 18px 16px;display:flex;gap:9px;justify-content:flex-end;border-top:1px solid var(--gray-border);}
.btn-cancel{padding:9px 18px;border-radius:7px;border:1.5px solid var(--gray-border);background:#fff;font-size:14px;font-weight:600;color:var(--gray-text);cursor:pointer;}
.btn-cancel:hover{background:var(--gray-bg);}
.btn-save{padding:9px 20px;border-radius:7px;border:none;background:var(--green-dark);color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.btn-save:hover{background:var(--green-mid);}
.upload-zone{border:2px dashed var(--gray-border);border-radius:7px;padding:14px;text-align:center;cursor:pointer;background:var(--gray-bg);}
.upload-text{font-size:13px;color:var(--gray-text);font-weight:500;}
.upload-text strong{color:var(--green-dark);}
.rte-wrapper{border:1.5px solid var(--gray-border);border-radius:9px;overflow:hidden;background:#fff;}
.rte-wrapper:focus-within{border-color:#aaa;}
.rte-toolbar{display:flex;align-items:center;gap:3px;padding:7px 10px;background:#f8f6f2;border-bottom:1.5px solid var(--gray-border);flex-wrap:wrap;}
.rte-select{padding:4px 8px;border:1.5px solid var(--gray-border);border-radius:6px;font-size:12px;font-weight:600;color:var(--dark);background:#fff;cursor:pointer;font-family:var(--font);outline:none;margin-right:4px;}
.rte-btn{min-width:30px;height:30px;border-radius:6px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#374151;transition:all .12s;font-family:var(--font);padding:0 5px;}
.rte-btn:hover{background:#e8e3d8;}
.rte-btn.rte-active{background:#e2d9cc;color:#3a2200;}
.rte-sep{width:1px;height:20px;background:#ddd;margin:0 4px;flex-shrink:0;}
.rte-content{min-height:110px;padding:12px 14px;font-size:16px;line-height:1.7;color:var(--dark);outline:none;}
.rte-content:empty::before{content:attr(data-placeholder);color:#b0a090;pointer-events:none;font-style:italic;}
.time-row{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:8px;}
.time-group{display:flex;flex-direction:column;gap:4px;}
.time-group label{font-size:11px;color:var(--gray-text);font-weight:600;}
.time-selects{display:flex;align-items:center;gap:5px;}
.time-sel{flex:1;padding:8px 6px;border:1.5px solid var(--gray-border);border-radius:7px;font-size:13px;font-family:var(--font);color:var(--dark);background:var(--gray-bg);outline:none;cursor:pointer;text-align:center;}
.time-sel:focus{border-color:var(--green-dark);background:#fff;}
.ldp-wrap{position:relative;width:100%;}
.ldp-input{display:flex;align-items:center;gap:8px;padding:9px 11px;border:1.5px solid var(--gray-border);border-radius:7px;background:var(--gray-bg);cursor:pointer;transition:border-color .15s;user-select:none;}
.ldp-input:hover,.ldp-input.open{border-color:var(--green-dark);background:#fff;}
.ldp-icon{width:16px;height:16px;color:var(--green-dark);flex-shrink:0;}
.ldp-text{flex:1;font-size:13px;color:var(--dark);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ldp-text.ph{color:#9ca3af;}
.ldp-clear{display:flex;align-items:center;justify-content:center;width:18px;height:18px;border:none;background:transparent;color:#aaa;cursor:pointer;border-radius:50%;padding:0;}
.ldp-clear:hover{color:var(--red);}
.ldp-cal{position:absolute;top:calc(100% + 5px);left:0;z-index:999;background:#fff;border:1.5px solid var(--gray-border);border-radius:12px;box-shadow:var(--shadow-lg);padding:12px 10px 0;width:280px;animation:modal-in .15s ease both;}
.ldp-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.ldp-title{font-size:13px;font-weight:800;color:var(--green-dark);}
.ldp-nav{display:flex;align-items:center;justify-content:center;width:26px;height:26px;border:1px solid var(--gray-border);border-radius:6px;background:transparent;cursor:pointer;color:var(--green-dark);font-size:13px;font-weight:700;}
.ldp-nav:hover{background:var(--green-pale);}
.ldp-wds{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px;}
.ldp-wds span{text-align:center;font-size:9px;font-weight:800;color:var(--gray-text);padding:3px 0;}
.ldp-wds .wd-sun{color:var(--red);}
.ldp-days{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;}
.ldp-day{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3px 1px;border-radius:6px;cursor:pointer;min-height:36px;transition:background .1s;}
.ldp-day:hover:not(.ldp-other){background:var(--green-pale);}
.ldp-day.ldp-other{opacity:.25;cursor:default;pointer-events:none;}
.ldp-day .d-sol{font-size:12px;font-weight:700;color:var(--dark);}
.ldp-day .d-lun{font-size:8px;color:var(--gray-text);}
.ldp-day.ldp-today:not(.ldp-sel) .d-sol{color:#f97316;font-weight:800;}
.ldp-day.ldp-sel{background:var(--green-dark)!important;border-radius:6px;}
.ldp-day.ldp-sel .d-sol,.ldp-day.ldp-sel .d-lun{color:#fff!important;}
.ldp-day.ldp-sun:not(.ldp-sel) .d-sol{color:var(--red);}
.ldp-day.ldp-sat:not(.ldp-sel) .d-sol{color:var(--green-dark);}
.ldp-foot{margin-top:8px;padding:7px 2px 9px;border-top:1px solid var(--gray-border);}
.ldp-foot-row{display:flex;align-items:baseline;gap:6px;margin-bottom:3px;}
.ldp-foot-lbl{font-size:9px;font-weight:700;color:var(--gray-text);min-width:60px;}
.ldp-foot-val{font-size:11px;font-weight:600;color:var(--dark);}
.ldp-foot-val.lunar{color:var(--green-dark);}
.feed-footer{display:flex;align-items:center;justify-content:space-between;margin-top:20px;flex-wrap:wrap;gap:8px;}
.feed-count{font-size:13px;font-weight:600;color:#9a8060;}
.feed-count strong{color:#2c1a0e;}
.pagination{display:flex;align-items:center;gap:4px;}
.pg-btn{min-width:30px;height:30px;border-radius:20px;border:1.5px solid var(--gray-border);background:#fff;font-size:13px;font-weight:700;color:#5a3d1a;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;padding:0 8px;}
.pg-btn:hover{background:var(--gray-bg);}
.pg-btn.active{background:#fff3cd;border-color:#e8c84a;color:#7a5a00;}
.pg-btn.pg-arrow{color:#9a8060;}
.pg-btn.pg-arrow:disabled{opacity:.35;cursor:default;}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-title-block">
    <div class="page-title-text">
      <div class="page-title">📢 THÔNG BÁO TOÀN CHÙA</div>
      <div class="page-lunar" id="pageLunar"></div>
    </div>
    <button class="create-btn" onclick="openModal()">
      <span class="create-btn-icon">+</span> Tạo thông báo
    </button>
  </div>
  <div class="top-bar">
    <span class="filter-label">Trạng thái</span>
    <button class="filter-btn fb-all active" onclick="setFilter('all',this)">Tất cả</button>
    <button class="filter-btn fb-red" onclick="setFilter('red',this)"><div class="fdot" style="background:#c0392b"></div>Khẩn cấp</button>
    <button class="filter-btn fb-orange" onclick="setFilter('orange',this)"><div class="fdot" style="background:#e8720a"></div>Quan trọng</button>
    <button class="filter-btn fb-green" onclick="setFilter('green',this)"><div class="fdot" style="background:#1a5c3a"></div>Bình thường</button>
    <div class="bar-sep"></div>
    <div class="search-inline">
      <span style="font-size:13px;color:#bbb;">🔍</span>
      <input type="text" placeholder="Tìm thông báo..." oninput="filterSearch(this.value)">
    </div>
  </div>
  <div id="feed"></div>

<script>
const LDP_CAN=['Giáp','Ất','Bính','Đinh','Mậu','Kỷ','Canh','Tân','Nhâm','Quý'];
const LDP_CHI=['Tý','Sửu','Dần','Mão','Thìn','Tỵ','Ngọ','Mùi','Thân','Dậu','Tuất','Hợi'];
const LDP_MONTHS=['Tháng 1','Tháng 2','Tháng 3','Tháng 4','Tháng 5','Tháng 6','Tháng 7','Tháng 8','Tháng 9','Tháng 10','Tháng 11','Tháng 12'];
function ldpJdFromDate(d,m,y){const a=Math.floor((14-m)/12);const yy=y+4800-a;const mm=m+12*a-3;let jd=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-Math.floor(yy/100)+Math.floor(yy/400)-32045;if(jd<2299161)jd=d+Math.floor((153*mm+2)/5)+365*yy+Math.floor(yy/4)-32083;return jd;}
function ldpGetNewMoonDay(k,tz){const T=k/1236.85,T2=T*T,T3=T2*T,dr=Math.PI/180;let Jd1=2415020.75933+29.53058868*k+0.0001178*T2-0.000000155*T3;Jd1+=0.00033*Math.sin((166.56+132.87*T-0.009173*T2)*dr);const M=359.2242+29.10535608*k-0.0000333*T2-0.00000347*T3,Mpr=306.0253+385.81691806*k+0.0107306*T2+0.00001236*T3,F=21.2964+390.67050646*k-0.0016528*T2-0.00000239*T3;let C1=(0.1734-0.000393*T)*Math.sin(M*dr)+0.0021*Math.sin(2*dr*M);C1-=0.4068*Math.sin(Mpr*dr)+0.0161*Math.sin(2*dr*Mpr)-0.0004*Math.sin(3*dr*Mpr)+0.0104*Math.sin(2*dr*F)-0.0051*Math.sin((M+Mpr)*dr)-0.0074*Math.sin((M-Mpr)*dr)+0.0004*Math.sin((2*F+M)*dr)-0.0004*Math.sin((2*F-M)*dr)-0.0006*Math.sin((2*F+Mpr)*dr)+0.001*Math.sin((2*F-Mpr)*dr)+0.0005*Math.sin((M+2*Mpr)*dr);let dt=T<-11?0.001+0.000839*T+0.0002261*T2-0.00000845*T3-0.000000081*T*T3:-0.000278+0.000265*T+0.000262*T2;return Math.floor(Jd1+C1-dt+0.5+tz/24);}
function ldpGetSunLong(jdn,tz){const T=(jdn-2451545.5-tz/24)/36525,T2=T*T,dr=Math.PI/180,M=357.5291+35999.0503*T-0.0001559*T2-0.00000048*T*T2,L0=280.46645+36000.76983*T+0.0003032*T2;let DL=(1.9146-0.004817*T-0.000014*T2)*Math.sin(dr*M)+(0.019993-0.000101*T)*Math.sin(dr*2*M)+0.00029*Math.sin(dr*3*M);let L=(L0+DL)*dr;L-=2*Math.PI*Math.floor(L/(2*Math.PI));return Math.floor(L/Math.PI*6);}
function ldpGetLunarMonth11(y,tz){const off=ldpJdFromDate(31,12,y)-2415021,k=Math.floor(off/29.530588853);let nm=ldpGetNewMoonDay(k,tz);if(ldpGetSunLong(nm,tz)>=9)nm=ldpGetNewMoonDay(k-1,tz);return nm;}
function ldpGetLeapOffset(a11,tz){const k=Math.floor((a11-2415021.076998695)/29.530588853+0.5);let last=0,i=1,arc=ldpGetSunLong(ldpGetNewMoonDay(k+i,tz),tz);do{last=arc;i++;arc=ldpGetSunLong(ldpGetNewMoonDay(k+i,tz),tz);}while(arc!==last&&i<14);return i-1;}
function ldpSolar2Lunar(d,m,y){const tz=7,jd=ldpJdFromDate(d,m,y),k=Math.floor((jd-2415021.076998695)/29.530588853);let ms=ldpGetNewMoonDay(k+1,tz);if(ms>jd)ms=ldpGetNewMoonDay(k,tz);let a11=ldpGetLunarMonth11(y,tz),b11=a11,ly;if(a11>=ms){ly=y;a11=ldpGetLunarMonth11(y-1,tz);}else{ly=y+1;b11=ldpGetLunarMonth11(y+1,tz);}const lday=jd-ms+1,diff=Math.floor((ms-a11)/29);let leap=0,lmonth=diff+11;if(b11-a11>365){const lo=ldpGetLeapOffset(a11,tz);if(diff>=lo){lmonth=diff+10;if(diff===lo)leap=1;}}if(lmonth>12)lmonth-=12;if(lmonth>=11&&diff<4)ly--;return{day:lday,month:lmonth,year:ly,isLeap:leap===1,canChiYear:LDP_CAN[(ly+6)%10]+' '+LDP_CHI[(ly+8)%12]};}
function ldpPad(n){return String(n).padStart(2,'0');}
function ldpFmtSolar(d){return `${ldpPad(d.getDate())}/${ldpPad(d.getMonth()+1)}/${d.getFullYear()}`;}

    fullContent:`<p>Kính gửi các Ban,</p><p>Ban Tri Sự nhắc nhở toàn thể các ban hoàn thành <strong>hồ sơ quyết toán tháng 3 Âm Lịch</strong> theo đúng quy trình và thời hạn quy định.</p><p><strong>⏰ Hạn nộp: trước 15h00 ngày 24/3 Âm Lịch.</strong></p><p>Hồ sơ quyết toán bao gồm:</p><ul><li>Bảng kê chi tiêu có chữ ký trưởng ban xác nhận</li><li>Toàn bộ chứng từ, hóa đơn hợp lệ kèm theo</li><li>Báo cáo tóm tắt hoạt động trong tháng (nếu có phát sinh chi phí bất thường)</li></ul><p>Các ban nộp trễ sẽ được ghi nhận trong biên bản họp định kỳ và ảnh hưởng đến đánh giá hoạt động. Mọi thắc mắc về biểu mẫu vui lòng liên hệ trực tiếp Ban Tri Sự trước ngày 23/3 Âm Lịch.</p>`,
    time:'21/3 Âm Lịch · 06:45',
    lunar:'21/3 Âm Lịch · 06:45',
    likedBy:randomLikedBy(),
    img:'https://images.unsplash.com/photo-1554224155-6726b3ff858f?w=800&h=450&fit=crop&q=80',
    edited:false
  },
  {
    id:5,
    color:'green',
    ban:'Ban Quản Chúng',
    title:'PHÂN CÔNG PHIÊN TRỰC LỄ THÁNG 4 ÂM LỊCH',
    excerpt:'Ban Quản Chúng thông báo lịch phân công phiên trực lễ tháng 4 Âm Lịch đến toàn thể đại chúng. Mỗi ban vui lòng kiểm tra lịch, bố trí nhân sự đầy đủ và báo cáo lại cho Ban Quản Chúng trước ngày 28/3 Âm Lịch.',
    fullContent:`<p>Ban Quản Chúng kính thông báo <strong>lịch phân công phiên trực lễ tháng 4 Âm Lịch</strong> đến toàn thể đại chúng.</p><p>Mỗi ban có trách nhiệm tự kiểm tra lịch phân công, chủ động bố trí nhân sự cho các phiên trực được giao. Trường hợp không thể thực hiện đúng lịch, vui lòng liên hệ Ban Quản Chúng <strong>trước 3 ngày</strong> để điều phối thay thế kịp thời.</p><p>Các mốc quan trọng cần lưu ý:</p><ul><li><strong>Ngày 01/4 ÂL:</strong> Lễ vía đầu tháng – trực lễ từ 4h30 sáng</li><li><strong>Ngày 15/4 ÂL:</strong> Lễ vía rằm tháng 4 – trực lễ từ 4h00 sáng</li><li><strong>Ngày 19/4 ÂL:</strong> Lễ Phật Đản chính thức – toàn thể đại chúng tham gia</li></ul><p>Ban Quản Chúng đề nghị toàn thể đại chúng nghiêm túc thực hiện đúng lịch trực và giữ gìn oai nghi trong các thời lễ.</p>`,
    time:'19/3 Âm Lịch · 10:00',
    lunar:'19/3 Âm Lịch · 10:00',
    likedBy:randomLikedBy(),
    img:'https://images.unsplash.com/photo-1528360983277-13d401cdc186?w=800&h=450&fit=crop&q=80',
    edited:false
  },
];

const colorMap={
  red:{cls:'c-red',dot:'#c0392b',label:'Khẩn Cấp',badgeBg:'#fdecea',badgeColor:'#c0392b'},
  orange:{cls:'c-orange',dot:'#e8720a',label:'Quan Trọng',badgeBg:'#fff0e4',badgeColor:'#e8720a'},
  green:{cls:'c-green',dot:'#1a5c3a',label:'Bình Thường',badgeBg:'#e8f5ee',badgeColor:'#1a5c3a'},
  teal:{cls:'c-teal',dot:'#00796b',label:'Bình Thường',badgeBg:'#e0f2f1',badgeColor:'#00796b'}
};
const sections=[{key:'red',name:'Khẩn Cấp'},{key:'orange',name:'Quan Trọng'},{key:'green',name:'Bình Thường'}];

function renderCard(n){
  const cm=colorMap[n.color];
  const hasImg=!!n.img;
  const imgHtml=hasImg?`<div class="notif-img"><img src="${n.img}" alt="" loading="lazy" onerror="this.parentElement.style.display='none'"></div>`:'';
  const likedBy=n.likedBy||[];
  const likeCount=likedBy.length;
  const popoverItems=likedBy.map(b=>`<div class="like-popover-item">${b}</div>`).join('');
  const popoverContent=likeCount>0?`<div class="like-popover-title">Đã thích</div><div class="like-popover-list">${popoverItems}</div>`:`<div class="like-popover-empty">Chưa có lượt thích</div>`;
  return`<div class="notif-card ${cm.cls}${hasImg?'':' no-img'}">${imgHtml}<div class="notif-body"><div class="notif-title-row"><div class="notif-dot" style="background:${cm.dot}"></div><div class="notif-title">${n.title}</div></div><div class="notif-excerpt-wrapper">${n.excerpt} <span class="notif-read-more" onclick="openDetail(${n.id})">Xem chi tiết →</span></div><div class="notif-meta"><span>📋 ${n.ban}</span><span class="notif-meta-sep">·</span><span>${n.lunar}</span>${n.edited?`<span class="notif-meta-sep">·</span><span class="edited-badge">✏️ Đã chỉnh sửa</span>`:''}<div class="notif-like" onclick="toggleLikePopover(event,'lp-${n.id}')">👍 ${likeCount}<div class="like-popover" id="lp-${n.id}">${popoverContent}</div></div></div></div></div>`;
}

function renderFeed(data){
  const feed=document.getElementById('feed');
  let html='';
  sections.forEach(sec=>{
    const items=data.filter(n=>n.color===sec.key);
    if(currentFilter!=='all'&&currentFilter!==sec.key)return;
    const cm=colorMap[sec.key];
    html+=`<div class="section-block" data-section="${sec.key}"><div class="section-head"><div class="section-dot" style="background:${cm.dot}"></div><div class="section-name" style="color:${cm.dot}">${sec.name}</div><div class="section-count">${items.length?`(${items.length})`:''}</div><div class="section-line"></div></div>`;
    if(!items.length){html+=`<div class="empty-state"><div class="es-icon">📭</div><div class="es-text">Không có thông báo</div></div>`;}
    else{items.forEach(n=>{html+=renderCard(n);});}
    html+=`</div>`;
  });
  feed.innerHTML=html;
}

function toggleLikePopover(e,popId){e.stopPropagation();const pop=document.getElementById(popId);if(!pop)return;const isOpen=pop.classList.contains('open');document.querySelectorAll('.like-popover.open').forEach(p=>p.classList.remove('open'));if(!isOpen)pop.classList.add('open');}
document.addEventListener('click',()=>{document.querySelectorAll('.like-popover.open').forEach(p=>p.classList.remove('open'));});

let currentFilter='all';let currentSearch='';
const PAGE_SIZE=4;const TOTAL=10;let currentPage=1;

function renderPagination(filtered){
  const totalPages=Math.ceil(TOTAL/PAGE_SIZE);
  const countEl=document.getElementById('feedCount');
  const pgEl=document.getElementById('pagination');
  if(countEl)countEl.innerHTML=`Hiển thị <strong>${filtered}</strong> / <strong>${TOTAL}</strong> thông báo`;
  if(!pgEl)return;
  let html=`<button class="pg-btn pg-arrow" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=totalPages;i++){html+=`<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;}
  html+=`<button class="pg-btn pg-arrow" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>›</button>`;
  pgEl.innerHTML=html;
}

function goPage(p){const totalPages=Math.ceil(TOTAL/PAGE_SIZE);if(p<1||p>totalPages)return;currentPage=p;applyFilters();}

function applyFilters(){let data=notifData;if(currentSearch){const q=currentSearch;data=data.filter(n=>n.title.toLowerCase().includes(q)||n.excerpt.toLowerCase().includes(q)||n.ban.toLowerCase().includes(q));}renderFeed(data);const filtered=document.querySelectorAll('.notif-card').length;renderPagination(filtered);}
function setFilter(color,btn){currentFilter=color;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');applyFilters();}
function filterSearch(val){currentSearch=val.toLowerCase();applyFilters();}
applyFilters();

function openDetail(id){
  const n=notifData.find(x=>x.id===id);if(!n)return;
  const cm=colorMap[n.color];
  let html=`<div class="detail-color-bar" style="background:${cm.dot}"></div>`;
  if(n.img)html+=`<img class="detail-hero" src="${n.img}" alt="">`;
  const likedBy=n.likedBy||[];
  const likeTagsHtml=likedBy.length>0?likedBy.map(b=>`<span class="detail-like-tag">👍 ${b}</span>`).join(''):`<span style="font-size:13px;color:#bbb;font-style:italic">Chưa có lượt thích</span>`;
  html+=`<div class="detail-content"><div class="detail-badge-row"><span class="detail-badge" style="background:${cm.badgeBg};color:${cm.badgeColor}"><span style="width:7px;height:7px;border-radius:50%;background:${cm.dot};display:inline-block"></span>${cm.label}</span><span class="detail-ban">📋 ${n.ban}</span></div><div class="detail-title">${n.title}</div><div class="detail-meta-row"><span>🕐 ${n.lunar}</span>${n.edited?`<span>·</span><span class="edited-badge">✏️ Đã chỉnh sửa</span>`:''}<span style="margin-left:auto">👍 ${likedBy.length}</span></div><div class="detail-body">${n.fullContent||'<p>'+n.excerpt+'</p>'}</div><div class="detail-like-section"><div class="detail-like-title">👍 Các ban đã thích</div><div class="detail-like-tags">${likeTagsHtml}</div></div></div>`;
  document.getElementById('detailModal').innerHTML=html;
  document.getElementById('detailOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetail(){document.getElementById('detailOverlay').classList.remove('open');document.body.style.overflow='';}
function handleDetailOverlayClick(e){if(e.target===document.getElementById('detailOverlay'))closeDetail();}

function openModal(){document.getElementById('overlay').classList.add('open');}
function closeModal(){document.getElementById('overlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closeModal();}

function saveNotif(){const title=document.getElementById('formTitle').value.trim();const ban=document.getElementById('formBan').value;const content=document.getElementById('rteContent').innerHTML;const selPriority=document.querySelector('.priority-opt.selected');if(!title||!ban||!content){alert('Vui lòng điền đầy đủ thông tin!');return;}const map2={'p-red':'red','p-orange':'orange','p-green':'green','p-teal':'teal'};const colorClass=[...selPriority.classList].find(c=>c.startsWith('p-'));const color=map2[colorClass]||'green';const now=new Date();const lun=ldpSolar2Lunar(now.getDate(),now.getMonth()+1,now.getFullYear());notifData.unshift({id:Date.now(),color,ban,title,excerpt:content.replace(/<[^>]+>/g,'').substring(0,160),fullContent:content,time:'Vừa xong',lunar:`${lun.day}/${lun.month} Âm Lịch`,likedBy:[],img:null});applyFilters();closeModal();document.getElementById('formTitle').value='';document.getElementById('rteContent').innerHTML='';document.getElementById('formBan').value='';}

function selectPriority(el){document.querySelectorAll('.priority-opt').forEach(o=>o.classList.remove('selected'));el.classList.add('selected');}
function execRTE(cmd,val){document.getElementById('rteContent').focus();document.execCommand(cmd,false,val||null);}
function execRTEBlock(tag){document.getElementById('rteContent').focus();document.execCommand('formatBlock',false,tag);}
function toggleRTE(cmd,btnId){document.getElementById('rteContent').focus();document.execCommand(cmd,false,null);document.getElementById(btnId).classList.toggle('rte-active',document.queryCommandState(cmd));}
function pickColor(){const colors=['#c0392b','#e8720a','#1a5c3a','#00796b','#2c1a0e','#7a3a00'];execRTE('foreColor',colors[Math.floor(Math.random()*colors.length)]);}
function insertLink(){const url=prompt('Nhập URL:','https://');if(url)execRTE('createLink',url);}
function insertEmoji(){const emojis=['🙏','📢','⚠️','✅','❌','📅','🔔','🌸','⭐','📿','🪔','🏛️'];document.getElementById('rteContent').focus();document.execCommand('insertText',false,emojis[Math.floor(Math.random()*emojis.length)]);}

const ldpState={1:{viewY:new Date().getFullYear(),viewM:new Date().getMonth(),sel:null},2:{viewY:new Date().getFullYear(),viewM:new Date().getMonth(),sel:null}};
const ldpToday=new Date();
function ldpBuildCal(idx){const s=ldpState[idx],cal=document.getElementById('ldpCal'+idx),{viewY:y,viewM:m}=s,days=[];const first=new Date(y,m,1);let dow=first.getDay()-1;if(dow<0)dow=6;const prevLast=new Date(y,m,0).getDate();for(let i=dow-1;i>=0;i--)days.push({date:new Date(y,m-1,prevLast-i),other:true});const dim=new Date(y,m+1,0).getDate();for(let d=1;d<=dim;d++)days.push({date:new Date(y,m,d),other:false});const need=Math.ceil(days.length/7)*7;for(let n=1;days.length<need;n++)days.push({date:new Date(y,m+1,n),other:true});let html=`<div class="ldp-hdr"><button class="ldp-nav" onclick="ldpNav(${idx},-1)">‹</button><span class="ldp-title">${LDP_MONTHS[m]} ${y}</span><button class="ldp-nav" onclick="ldpNav(${idx},1)">›</button></div><div class="ldp-wds"><span>T2</span><span>T3</span><span>T4</span><span>T5</span><span>T6</span><span>T7</span><span class="wd-sun">CN</span></div><div class="ldp-days">`;days.forEach(item=>{const lun=ldpSolar2Lunar(item.date.getDate(),item.date.getMonth()+1,item.date.getFullYear()),isTd=item.date.getFullYear()===ldpToday.getFullYear()&&item.date.getMonth()===ldpToday.getMonth()&&item.date.getDate()===ldpToday.getDate(),isSel=s.sel&&item.date.getFullYear()===s.sel.getFullYear()&&item.date.getMonth()===s.sel.getMonth()&&item.date.getDate()===s.sel.getDate();const cls=['ldp-day',item.other?'ldp-other':'',isTd?'ldp-today':'',isSel?'ldp-sel':'',item.date.getDay()===0?'ldp-sun':'',item.date.getDay()===6?'ldp-sat':''].filter(Boolean).join(' ');const ca=item.other?'':`onclick="ldpSelectDay(${idx},new Date(${item.date.getFullYear()},${item.date.getMonth()},${item.date.getDate()}))"`;html+=`<div class="${cls}" ${ca}><span class="d-sol">${item.date.getDate()}</span><span class="d-lun">${lun.day}/${lun.month}</span></div>`;});html+=`</div>`;if(s.sel){const lun=ldpSolar2Lunar(s.sel.getDate(),s.sel.getMonth()+1,s.sel.getFullYear());html+=`<div class="ldp-foot"><div class="ldp-foot-row"><span class="ldp-foot-lbl">Dương lịch:</span><span class="ldp-foot-val">${ldpFmtSolar(s.sel)}</span></div><div class="ldp-foot-row"><span class="ldp-foot-lbl">Âm lịch:</span><span class="ldp-foot-val lunar">Ngày ${lun.day} tháng ${lun.month}${lun.isLeap?' (nhuận)':''} năm ${lun.canChiYear}</span></div></div>`;}cal.innerHTML=html;}
function ldpSelectDay(idx,date){const s=ldpState[idx];s.sel=date;const lun=ldpSolar2Lunar(date.getDate(),date.getMonth()+1,date.getFullYear()),lunarStr=`${lun.day}/${lun.month}${lun.isLeap?' (nhuận)':''} ${lun.canChiYear}`,textEl=document.getElementById('ldpText'+idx);textEl.textContent=`${ldpFmtSolar(date)} (${lunarStr})`;textEl.classList.remove('ph');document.getElementById('ldpClear'+idx).style.display='flex';ldpBuildCal(idx);setTimeout(()=>{document.getElementById('ldpCal'+idx).style.display='none';document.getElementById('ldpInput'+idx).classList.remove('open');},120);}
function ldpNav(idx,dir){const s=ldpState[idx];s.viewM+=dir;if(s.viewM>11){s.viewM=0;s.viewY++;}if(s.viewM<0){s.viewM=11;s.viewY--;}ldpBuildCal(idx);}
function toggleLdp(idx){const cal=document.getElementById('ldpCal'+idx),inp=document.getElementById('ldpInput'+idx),isOpen=cal.style.display!=='none';[1,2].forEach(i=>{document.getElementById('ldpCal'+i).style.display='none';document.getElementById('ldpInput'+i).classList.remove('open');});if(!isOpen){ldpBuildCal(idx);cal.style.display='block';inp.classList.add('open');}}
function clearLdp(e,idx){e.stopPropagation();ldpState[idx].sel=null;const textEl=document.getElementById('ldpText'+idx);textEl.textContent='Chọn ngày...';textEl.classList.add('ph');document.getElementById('ldpClear'+idx).style.display='none';ldpBuildCal(idx);}
document.addEventListener('click',e=>{[1,2].forEach(idx=>{const wrap=document.getElementById('ldpWrap'+idx);if(wrap&&!wrap.contains(e.target)){document.getElementById('ldpCal'+idx).style.display='none';document.getElementById('ldpInput'+idx).classList.remove('open');}});});
</script>
</body>
</html>
